sentence=Easiest way to send/receive "NAME:value" data over Bluetooth (or any Stream) with the Arduino Bluetooth (GDD) app.
paragraph=Parses and emits the app's NAME:value channel protocol used by Switch I/O and the AI chat. Bind a channel name straight to a digital/analog pin in one line in setup(), or read/send values yourself with value()/send(). Works with any Stream (BluetoothSerial, HardwareSerial, SoftwareSerial) so the same sketch runs on ESP32, Uno, Nano or Mega.
