sentence=Easiest way to talk to every screen of the Arduino Bluetooth (GDD) app — Hand, Gamepad, Servo, Car, Tilt, Voice and Switch I/O — over Bluetooth (or any Stream).
paragraph=Parses both message formats the app sends (framed "<...>" messages and the NAME:value / raw command protocol) and fires one callback per screen, so a sketch just registers what it needs instead of hand-parsing strings. Switch I/O can also bind a channel name straight to a digital/analog pin in one line in setup(). Works with any Stream (BluetoothSerial, HardwareSerial, SoftwareSerial) so the same sketch runs on ESP32, Uno, Nano or Mega.
category=Communication
