name=GDDLink
version=1.2.0
author=ครูนิน
maintainer=ครูนิน
sentence=Easiest way to talk to every screen of the Arduino Bluetooth (GDD) app — Hand, Gamepad, Servo, Car, Tilt, Voice and Switch I/O — over Bluetooth (or any Stream).
paragraph=Parses both message formats the app sends (framed "<...>" messages and the NAME:value / raw command protocol) and fires one callback per screen, so a sketch just registers what it needs instead of hand-parsing strings. The common cases (Switch I/O channels, gestures, gamepad buttons, and standard H-bridge motor driving for Car/Tilt) can bind straight to a pin in one line in setup(), no callback function required at all. Works with any Stream (BluetoothSerial, HardwareSerial, SoftwareSerial) so the same sketch runs on ESP32, Uno, Nano or Mega.
category=Communication
url=https://github.com/Ninlapat5G/GDDLink
architectures=*
